version: '3.8'

services:
  #1. Baza danych PostgreSQL
  db:
    image: postgres:15-alpine
    container_name: workflow_db
    restart: always
    environment:
      - POSTGRES_USER=workflow_user
      - POSTGRES_PASSWORD=workflow_password
      - POSTGRES_DB=workflow_engine
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  #2. Silnik Backendowy FastAPI
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: workflow_backend
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - AZURE_SERVICEBUS_QUEUE_NAME=tasks
      - AZURE_SERVICEBUS_CONNECTION_STRING=${AZURE_SERVICEBUS_CONNECTION_STRING}
      - AZURE_APP_CONFIG_CONNECTION_STRING=${AZURE_APP_CONFIG_CONNECTION_STRING}
      - APPLICATIONINSIGHTS_CONNECTION_STRING=${APPLICATIONINSIGHTS_CONNECTION_STRING}
    ports:
      - "8000:8000"
    volumes:
      - .:/workspace
    working_dir: /workspace
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload

  #3. Frontend React

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: workflow_frontend
    environment:
      - VITE_API_BASE_URL=http://localhost:8000/api/v1
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0

volumes:
  postgres_data: